<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasımpaşa Kuyumcusu</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 5px; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 5px; font-size: 18px; }
        .time { text-align: center; color: #888; font-size: 11px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th { background-color: #2c3e50; color: #f1c40f; padding: 10px 5px; font-size: 13px; text-align: center; }
        td { padding: 10px 5px; border-bottom: 1px solid #2d2d2d; font-size: 14px; font-weight: 500; text-align: center; }
        .name-col { text-align: left; color: #ddd; font-weight: bold; }
        .artti { color: #2ecc71; } .dustu { color: #ff4d4d; } .sabit { color: #ffffff; }
    </style>
</head>
<body>
<div class="container">
    <h2>KASIMPAŞA KUYUMCUSU</h2>
    <div class="time" id="zaman"></div>
    <table>
        <thead><tr><th>ÜRÜN ADI</th><th>ALIŞ</th><th>SATIŞ</th><th>FARK</th></tr></thead>
        <tbody id="tablo"></tbody>
    </table>
</div>

<script>
    // İstediğin SIRA (Bu sıra asla bozulmaz)
    const sira = ["hasaltin", "gramaltin", "eskiceyrek", "yeniceyrek", "eskiyarim", "yeniyarim", "eskitam", "yenitam", "eskiata", "yeniata", "22ayargram", "22ayarbilezik"];
    const isimler = { "hasaltin":"HAS ALTIN", "gramaltin":"GRAM ALTIN", "eskiceyrek":"ESKİ ÇEYREK", "yeniceyrek":"YENİ ÇEYREK", "eskiyarim":"ESKİ YARIM", "yeniyarim":"YENİ YARIM", "eskitam":"ESKİ TAM", "yenitam":"YENİ TAM", "eskiata":"ESKİ ATA", "yeniata":"YENİ ATA", "22ayargram":"22 AYAR GRAM", "22ayarbilezik":"22 AYAR BİLEZİK" };
    
    let hafiza = {};

    function guncelle() {
        fetch('https://kasimpasakuyumcusu-aa3cc-default-rtdb.firebaseio.com/fiyatlar.json')
        .then(r => r.json()).then(data => {
            document.getElementById('zaman').innerText = "Son Güncelleme: " + new Date().toLocaleDateString('tr-TR') + " " + data.sonGuncelleme;
            let tbody = document.getElementById('tablo');
            tbody.innerHTML = "";

            sira.forEach(id => {
                let u = data.urunler[id];
                if (!u) return;

                let alis = Number(u.alis).toFixed(2);
                let satis = Number(u.satis).toFixed(2);
                
                // Renk mantığı
                let aRenk = hafiza[id] && u.alis > hafiza[id].alis ? 'artti' : (hafiza[id] && u.alis < hafiza[id].alis ? 'dustu' : 'sabit');
                let sRenk = hafiza[id] && u.satis > hafiza[id].satis ? 'artti' : (hafiza[id] && u.satis < hafiza[id].satis ? 'dustu' : 'sabit');
                
                hafiza[id] = {alis: u.alis, satis: u.satis};

                tbody.innerHTML += `<tr>
                    <td class="name-col">${isimler[id]}</td>
                    <td class="${aRenk}">${alis}</td>
                    <td class="${sRenk}">${satis}</td>
                    <td class="${u.fark > 0 ? 'artti' : 'dustu'}">${u.fark > 0 ? '↑' : '↓'} %${Math.abs(u.fark).toFixed(2)}</td>
                </tr>`;
            });
        });
    }
    setInterval(guncelle, 3000);
    guncelle();
</script>
</body>
</html>
