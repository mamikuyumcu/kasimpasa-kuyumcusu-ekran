<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasımpaşa Kuyumcusu Canlı Fiyatlar</title>

    <style>
        :root {
            --bg: #000000;
            --bg-soft: #000000;
            --card: rgba(28, 28, 30, 0.74);
            --card-solid: #1c1c1e;
            --text: #f5f5f7;
            --muted: #8e8e93;
            --line: rgba(255,255,255,0.10);
            --accent: #ffd60a;
            --accent-soft: rgba(255,214,10,0.14);
            --thead: rgba(255,255,255,0.055);
            --shadow: 0 18px 60px rgba(0,0,0,0.78);
            --up: #30d158;
            --down: #ff453a;
            --neutral: #ffffff;
            --blur: blur(24px);
        }

        body[data-theme="koyu"] {
            --bg: #000000;
            --bg-soft: #000000;
            --card: rgba(28, 28, 30, 0.74);
            --card-solid: #1c1c1e;
            --text: #f5f5f7;
            --muted: #8e8e93;
            --line: rgba(255,255,255,0.10);
            --accent: #ffd60a;
            --accent-soft: rgba(255,214,10,0.14);
            --thead: rgba(255,255,255,0.055);
            --shadow: 0 18px 60px rgba(0,0,0,0.78);
            --neutral: #ffffff;
        }

        body[data-theme="acik"] {
            --bg: #f5f5f7;
            --bg-soft: #ffffff;
            --card: rgba(255,255,255,0.82);
            --card-solid: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: rgba(0,0,0,0.08);
            --accent: #b88700;
            --accent-soft: rgba(184,135,0,0.12);
            --thead: rgba(0,0,0,0.035);
            --shadow: 0 18px 45px rgba(0,0,0,0.12);
            --neutral: #1d1d1f;
        }

        body[data-theme="classic"] {
            --bg: #121212;
            --bg-soft: #1e1e1e;
            --card: #1e1e1e;
            --card-solid: #1e1e1e;
            --text: #ffffff;
            --muted: #888888;
            --line: #2d2d2d;
            --accent: #f1c40f;
            --accent-soft: rgba(241,196,15,0.14);
            --thead: #2c3e50;
            --shadow: 0 4px 10px rgba(0,0,0,0.3);
            --neutral: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            background: var(--bg);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding: 14px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
            padding-top: 54px;
        }

        .top-bar {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 50;
            pointer-events: none;
        }

        .menu-wrap {
            position: relative;
            width: max-content;
            pointer-events: auto;
        }

        .menu-button {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--text);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .menu-lines {
            width: 18px;
            display: grid;
            gap: 4px;
        }

        .menu-lines span {
            height: 2px;
            background: var(--text);
            border-radius: 999px;
            display: block;
        }

        .popup {
            position: absolute;
            top: 54px;
            left: 0;
            width: min(350px, calc(100vw - 24px));
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 26px;
            padding: 14px;
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(-8px) scale(0.98);
            pointer-events: none;
            transition: 0.18s ease;
        }

        .popup.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .popup-title {
            font-size: 13px;
            color: var(--muted);
            margin: 6px 2px 10px;
            font-weight: 800;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .theme-btn {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.045);
            color: var(--text);
            border-radius: 16px;
            padding: 11px 8px;
            font-weight: 850;
            font-size: 13px;
            cursor: pointer;
        }

        body[data-theme="acik"] .theme-btn {
            background: rgba(0,0,0,0.035);
        }

        .theme-btn.active {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .quick-calc {
            border-top: 1px solid var(--line);
            padding-top: 12px;
        }

        .form-row {
            display: grid;
            gap: 8px;
            margin-bottom: 9px;
        }

        .form-row.two {
            grid-template-columns: 1fr 1fr;
        }

        label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: -3px;
        }

        select,
        input {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            border-radius: 15px;
            padding: 12px 12px;
            outline: none;
            font-size: 14px;
            font-weight: 750;
        }

        body[data-theme="acik"] select,
        body[data-theme="acik"] input {
            background: rgba(0,0,0,0.035);
        }

        option {
            color: #111111;
        }

        .calc-result {
            margin-top: 10px;
            border-radius: 19px;
            background: var(--accent-soft);
            border: 1px solid var(--line);
            padding: 13px;
        }

        .calc-result small {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .calc-result strong {
            display: block;
            color: var(--accent);
            font-size: 23px;
            line-height: 1.2;
            font-variant-numeric: tabular-nums;
        }

        .brand-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 30px;
            padding: 20px 14px 17px;
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
            margin-bottom: 13px;
        }

        h2 {
            text-align: center;
            color: var(--accent);
            margin: 0 0 8px;
            font-size: 22px;
            letter-spacing: 0.35px;
            line-height: 1.24;
            font-weight: 950;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-top: 3px;
        }

        .time {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-top: 10px;
            display: grid;
            gap: 5px;
        }

        .date-pill {
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--line);
        }

        body[data-theme="acik"] .date-pill {
            background: rgba(0,0,0,0.035);
        }

        .table-card {
            border-radius: 26px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--line);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--thead);
            color: var(--accent);
            padding: 13px 10px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid var(--line);
            font-size: 15px;
            font-weight: 850;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .name-col {
            color: var(--text);
            max-width: 130px;
        }

        .fiyat {
            text-align: right;
            transition: color 0.25s ease, transform 0.25s ease, filter 0.25s ease;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .fiyat.slot-spin {
            transform: translateY(-1px);
            filter: brightness(1.2);
        }

        .fark-col {
            text-align: right;
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .artti {
            color: var(--up);
        }

        .dustu {
            color: var(--down);
        }

        .sabit {
            color: var(--neutral);
        }

        .status-line {
            margin-top: 12px;
            text-align: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
        }

        @media (max-width: 430px) {
            body {
                padding: 10px;
            }

            .container {
                padding-top: 52px;
            }

            h2 {
                font-size: 20px;
            }

            .popup {
                width: calc(100vw - 20px);
            }

            th {
                font-size: 11px;
                padding: 12px 7px;
            }

            td {
                font-size: 14px;
                padding: 13px 7px;
            }

            .name-col {
                max-width: 108px;
            }

            .fark-col {
                font-size: 13px;
            }
        }
    </style>
</head>

<body data-theme="koyu">

<div class="top-bar">
    <div class="menu-wrap">
        <button class="menu-button" id="menuButton" aria-label="Menü">
            <span class="menu-lines">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div class="popup" id="menuPopup">
            <div class="popup-title">Tema</div>

            <div class="theme-grid">
                <button class="theme-btn active" data-theme-set="koyu">Koyu</button>
                <button class="theme-btn" data-theme-set="acik">Açık</button>
                <button class="theme-btn" data-theme-set="classic">Klasik</button>
            </div>

            <div class="quick-calc">
                <div class="popup-title">Hızlı Hesap</div>

                <div class="form-row">
                    <label>Ürün</label>
                    <select id="calcUrun"></select>
                </div>

                <div class="form-row two">
                    <div>
                        <label>Fiyat Tipi</label>
                        <select id="calcTip">
                            <option value="alis">Alış</option>
                            <option value="satis">Satış</option>
                        </select>
                    </div>

                    <div>
                        <label>İşlem</label>
                        <select id="calcIslem">
                            <option value="carp">Fiyat × Sayı</option>
                            <option value="bol">Fiyat ÷ Sayı</option>
                            <option value="sayiBolFiyat">Sayı ÷ Fiyat</option>
                            <option value="topla">Fiyat + Sayı</option>
                            <option value="cikar">Fiyat - Sayı</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <label>Sayı / Gram / Tutar</label>
                    <input id="calcSayi" type="number" inputmode="decimal" placeholder="Örn: 10" step="0.01">
                </div>

                <div class="calc-result">
                    <small id="calcBase">Seçili fiyat: -</small>
                    <strong id="calcSonuc">-</strong>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="brand-card">
        <h2>KASIMPAŞA KUYUMCUSU<br>CANLI ALTIN FİYATLARI</h2>
        <div class="subtitle">Anlık alış ve satış ekranı</div>
        <div class="time" id="guncellemeZamani">Yükleniyor...</div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">ÜRÜN ADI</th>
                    <th style="text-align: right;">ALIŞ</th>
                    <th style="text-align: right;">SATIŞ</th>
                    <th style="text-align: right;">FARK</th>
                </tr>
            </thead>
            <tbody id="fiyatTablosu"></tbody>
        </table>
    </div>

    <div class="status-line" id="durumYazisi">Fiyatlar 3 saniyede bir kontrol edilir.</div>
</div>

<script>
    const excelSirasi = [
        { id: "hasaltin", ad: "Has Altın" },
        { id: "gramaltin", ad: "Gram Altın" },
        { id: "eskiceyrek", ad: "Eski Çeyrek" },
        { id: "yeniceyrek", ad: "Yeni Çeyrek" },
        { id: "eskiyarim", ad: "Eski Yarım" },
        { id: "yeniyarim", ad: "Yeni Yarım" },
        { id: "eskitam", ad: "Eski Tam" },
        { id: "yenitam", ad: "Yeni Tam" },
        { id: "eskiata", ad: "Eski Ata" },
        { id: "yeniata", ad: "Yeni Ata" },
        { id: "22ayargram", ad: "22 Ayar Gram" },
        { id: "22ayarbilezik", ad: "22 Ayar Bilezik" }
    ];

    const izinliTemalar = ["koyu", "acik", "classic"];

    let anlikFiyatHafizasi = {};
    let fiyatCache = {};
    let ilkYukleme = true;

    const tbody = document.getElementById("fiyatTablosu");
    const guncellemeZamani = document.getElementById("guncellemeZamani");
    const durumYazisi = document.getElementById("durumYazisi");

    const menuButton = document.getElementById("menuButton");
    const menuPopup = document.getElementById("menuPopup");

    const calcUrun = document.getElementById("calcUrun");
    const calcTip = document.getElementById("calcTip");
    const calcIslem = document.getElementById("calcIslem");
    const calcSayi = document.getElementById("calcSayi");
    const calcBase = document.getElementById("calcBase");
    const calcSonuc = document.getElementById("calcSonuc");

    function paraFormatla(deger) {
        const sayi = Number(deger || 0);

        return sayi.toLocaleString("tr-TR", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    function tarihFormatla() {
        return new Date().toLocaleString("tr-TR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
        });
    }

    function guvenliSayi(deger) {
        const sayi = Number(deger);
        return Number.isFinite(sayi) ? sayi : 0;
    }

    function tabloSatirlariniKur() {
        tbody.innerHTML = excelSirasi.map(item => `
            <tr>
                <td class="name-col">${item.ad}</td>
                <td class="fiyat sabit" id="${item.id}-alis">-</td>
                <td class="fiyat sabit" id="${item.id}-satis">-</td>
                <td class="fark-col sabit" id="${item.id}-fark">-</td>
            </tr>
        `).join("");
    }

    function hesapUrunleriniKur() {
        calcUrun.innerHTML = excelSirasi.map(item => `
            <option value="${item.id}">${item.ad}</option>
        `).join("");
    }

    function fiyatRengiBelirle(yeniFiyat, eskiFiyat, eskiRenk) {
        if (yeniFiyat > eskiFiyat) return "artti";
        if (yeniFiyat < eskiFiyat) return "dustu";
        return eskiRenk || "sabit";
    }

    function fiyatHucresiGuncelle(element, yeniFiyat, renkClass, animasyonYap) {
        if (!element) return;

        element.classList.remove("artti", "dustu", "sabit");
        element.classList.add(renkClass);

        if (!animasyonYap) {
            element.textContent = paraFormatla(yeniFiyat);
            return;
        }

        element.classList.add("slot-spin");

        const finalText = paraFormatla(yeniFiyat);
        const baslangic = performance.now();
        const sure = 620;

        function animasyon(now) {
            const ilerleme = Math.min((now - baslangic) / sure, 1);

            if (ilerleme < 1) {
                const oynayanSayi = yeniFiyat + ((Math.random() - 0.5) * yeniFiyat * 0.018);
                element.textContent = paraFormatla(oynayanSayi);
                requestAnimationFrame(animasyon);
            } else {
                element.textContent = finalText;
                element.classList.remove("slot-spin");
            }
        }

        requestAnimationFrame(animasyon);
    }

    function fiyatlariGetir() {
        fetch("https://kasimpasakuyumcusu-aa3cc-default-rtdb.firebaseio.com/fiyatlar.json?t=" + Date.now())
            .then(response => response.json())
            .then(data => {
                if (!data || !data.urunler) {
                    durumYazisi.textContent = "Veri alınamadı.";
                    return;
                }

                const cihazTarihi = tarihFormatla();
                const kaynakGuncelleme = data.sonGuncelleme || "-";

                guncellemeZamani.innerHTML = `
                    <span>Son Güncelleme: ${kaynakGuncelleme}</span>
                    <span class="date-pill">Tarih: ${cihazTarihi}</span>
                `;

                excelSirasi.forEach(item => {
                    const urun = data.urunler[item.id];

                    if (!urun) return;

                    const alisFiyat = guvenliSayi(urun.alis);
                    const satisFiyat = guvenliSayi(urun.satis);
                    const farkYuzde = guvenliSayi(urun.fark || 0);

                    fiyatCache[item.id] = {
                        ad: item.ad,
                        alis: alisFiyat,
                        satis: satisFiyat
                    };

                    let ok = "- ";
                    let farkRenk = "sabit";

                    if (farkYuzde > 0) {
                        ok = "↑ ";
                        farkRenk = "artti";
                    } else if (farkYuzde < 0) {
                        ok = "↓ ";
                        farkRenk = "dustu";
                    }

                    const formatliFark = ok + "%" + Math.abs(farkYuzde).toLocaleString("tr-TR", {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });

                    let alisRenk = "sabit";
                    let satisRenk = "sabit";

                    if (anlikFiyatHafizasi[item.id]) {
                        const eski = anlikFiyatHafizasi[item.id];

                        alisRenk = fiyatRengiBelirle(alisFiyat, eski.alis, eski.alisRenk);
                        satisRenk = fiyatRengiBelirle(satisFiyat, eski.satis, eski.satisRenk);
                    }

                    const alisEl = document.getElementById(`${item.id}-alis`);
                    const satisEl = document.getElementById(`${item.id}-satis`);
                    const farkEl = document.getElementById(`${item.id}-fark`);

                    const alisDegisti = !anlikFiyatHafizasi[item.id] || anlikFiyatHafizasi[item.id].alis !== alisFiyat;
                    const satisDegisti = !anlikFiyatHafizasi[item.id] || anlikFiyatHafizasi[item.id].satis !== satisFiyat;

                    fiyatHucresiGuncelle(alisEl, alisFiyat, alisRenk, !ilkYukleme && alisDegisti);
                    fiyatHucresiGuncelle(satisEl, satisFiyat, satisRenk, !ilkYukleme && satisDegisti);

                    if (farkEl) {
                        farkEl.classList.remove("artti", "dustu", "sabit");
                        farkEl.classList.add(farkRenk);
                        farkEl.textContent = formatliFark;
                    }

                    anlikFiyatHafizasi[item.id] = {
                        alis: alisFiyat,
                        satis: satisFiyat,
                        alisRenk: alisRenk,
                        satisRenk: satisRenk
                    };
                });

                ilkYukleme = false;
                durumYazisi.textContent = "Fiyatlar 3 saniyede bir kontrol edilir.";
                hesapla();
            })
            .catch(error => {
                console.error("Hata:", error);
                durumYazisi.textContent = "Bağlantı hatası. Fiyatlar tekrar denenecek.";
            });
    }

    function hesapla() {
        const urunId = calcUrun.value;
        const tip = calcTip.value;
        const islem = calcIslem.value;
        const sayi = Number(calcSayi.value);

        if (!fiyatCache[urunId]) {
            calcBase.textContent = "Seçili fiyat: -";
            calcSonuc.textContent = "-";
            return;
        }

        const fiyat = Number(fiyatCache[urunId][tip] || 0);
        const urunAdi = fiyatCache[urunId].ad;
        const tipYazisi = tip === "alis" ? "Alış" : "Satış";

        calcBase.textContent = `${urunAdi} ${tipYazisi}: ${paraFormatla(fiyat)} TL`;

        if (!Number.isFinite(sayi) || sayi === 0) {
            calcSonuc.textContent = "-";
            return;
        }

        let sonuc = 0;

        if (islem === "carp") sonuc = fiyat * sayi;
        if (islem === "bol") sonuc = fiyat / sayi;
        if (islem === "sayiBolFiyat") sonuc = sayi / fiyat;
        if (islem === "topla") sonuc = fiyat + sayi;
        if (islem === "cikar") sonuc = fiyat - sayi;

        calcSonuc.textContent = paraFormatla(sonuc);
    }

    menuButton.addEventListener("click", function(event) {
        event.stopPropagation();
        menuPopup.classList.toggle("open");
    });

    document.addEventListener("click", function(event) {
        if (!menuPopup.contains(event.target) && !menuButton.contains(event.target)) {
            menuPopup.classList.remove("open");
        }
    });

    document.querySelectorAll(".theme-btn").forEach(button => {
        button.addEventListener("click", function() {
            const theme = this.dataset.themeSet;

            document.body.setAttribute("data-theme", theme);
            localStorage.setItem("kk-theme", theme);

            document.querySelectorAll(".theme-btn").forEach(btn => btn.classList.remove("active"));
            this.classList.add("active");
        });
    });

    function kayitliTemayiYukle() {
        let theme = localStorage.getItem("kk-theme") || "koyu";

        if (!izinliTemalar.includes(theme)) {
            theme = "koyu";
            localStorage.setItem("kk-theme", theme);
        }

        document.body.setAttribute("data-theme", theme);

        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.themeSet === theme);
        });
    }

    [calcUrun, calcTip, calcIslem, calcSayi].forEach(el => {
        el.addEventListener("input", hesapla);
        el.addEventListener("change", hesapla);
    });

    tabloSatirlariniKur();
    hesapUrunleriniKur();
    kayitliTemayiYukle();

    fiyatlariGetir();
